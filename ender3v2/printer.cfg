# Ender 3 V2 Klipper Configuration
# This configuration is for the stock Ender 3 V2 with 4.2.2 or 4.2.7 mainboard

[mcu]
serial: /dev/ttyPrinter
# Stable symlink created by udev rule for CH340 device

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 7000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PA7
position_endstop: 0.0
position_min: 0
position_max: 250
homing_speed: 4
second_homing_speed: 1
homing_retract_dist: 5.0

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 34.406
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 250
pressure_advance: 0.0
pressure_advance_smooth_time: 0.040

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[fan]
pin: PA0

[input_shaper]
# Run input shaper calibration to find your specific values
# For now, these are safe defaults for Ender 3
shaper_freq_x: 40
shaper_freq_y: 40
shaper_type: mzv

[bed_screws]
screw1: 30, 30
screw1_name: Front Left
screw2: 200, 30
screw2_name: Front Right
screw3: 200, 200
screw3_name: Rear Right
screw4: 30, 200
screw4_name: Rear Left
horizontal_move_z: 5
speed: 50

[virtual_sdcard]
path: /opt/printer_data/gcodes

[display_status]

[pause_resume]

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
      {% set z_safe = 2.0 %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE

# Safety: Require homing before print
# Safety: Emergency stop macro
[gcode_macro EMERGENCY_STOP]
description: Emergency stop - kills everything
gcode:
  M112

# Force safe start print sequence
[gcode_macro START_PRINT]
description: Safe print start with checks
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
  
  # Pre-checks
  {% if not 'xyz' in printer.toolhead.homed_axes %}
    {action_respond_info("WARNING: Printer not homed - homing now")}
    G28
  {% endif %}
  
  # Heat bed and wait
  M140 S{BED_TEMP}
  M190 S{BED_TEMP}
  
  # Heat nozzle and wait
  M104 S{EXTRUDER_TEMP}
  M109 S{EXTRUDER_TEMP}
  
  # Prime line at safe height
  G1 Z5.0 F3000
  G1 X5 Y20 Z0.3 F5000.0
  G1 X5 Y200.0 Z0.3 F1500.0 E15
  G1 X5.4 Y200.0 Z0.3 F5000.0
  G1 X5.4 Y20 Z0.3 F1500.0 E30
  G1 Z2.0 F3000
  G92 E0

[gcode_macro END_PRINT]
description: Safe print end
gcode:
  G91
  G1 E-2 F2700
  G1 E-2 Z0.2 F2400
  G1 X5 Y5 F3000
  G1 Z10
  G90
  G1 X0 Y220
  M106 S0
  M104 S0
  M140 S0
  M84 X Y E

# Allow Fluidd to pause on errors
[respond]

# Optional: Virtual SDcard safety
[force_move]
enable_force_move: True
